name: Shadow Signal Engine

on:
  schedule:
    # Fires at :10, :25, :40, :55 of every hour — matches the 10-min snapshot window
    - cron: '10,25,40,55 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  run-shadow:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger shadow engine
        run: |
          curl -X POST \
            "${{ secrets.NETLIFY_SHADOW_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"source":"github-actions"}' \
            --max-time 25 \
            --silent \
            --show-error
